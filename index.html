<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Simple countdown timer with selectable beep duration and repeat interval." />
  <meta name="theme-color" content="#6c63ff" />
  <title>Timer ♾️</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Buzzing overlay -->
  <div id="buzz-overlay" class="buzz-overlay hidden" aria-live="assertive" aria-atomic="true">
    <span>🔔 BUZZ!</span>
  </div>

  <div class="container">

    <h1 class="app-title">Timer <span aria-hidden="true">♾️</span></h1>

    <!-- Progress bar -->
    <div class="progress-track" aria-label="Timer progress">
      <div id="progress-bar" class="progress-bar" style="width:0%"></div>
    </div>

    <!-- Countdown display -->
    <div id="timer-display" class="timer-display" aria-live="polite">00:00:00</div>

    <!-- Status label -->
    <div id="status-label" class="status-label">Ready</div>

    <!-- Settings form -->
    <form id="settings-form" class="settings-form" novalidate>

      <!-- 1. Timer Duration -->
      <fieldset class="fieldset">
        <legend>Timer Duration</legend>
        <div class="input-row">
          <label for="dur-hr">Hr</label>
          <input id="dur-hr" class="num-input" type="number"
                 min="0" max="23" value="0" placeholder="hh"
                 aria-label="Duration hours" />
          <span class="sep">:</span>
          <label for="dur-min">Min</label>
          <input id="dur-min" class="num-input" type="number"
                 min="0" max="59" value="1" placeholder="mm"
                 aria-label="Duration minutes" />
          <span class="sep">:</span>
          <label for="dur-sec">Sec</label>
          <input id="dur-sec" class="num-input" type="number"
                 min="0" max="59" value="0" placeholder="ss"
                 aria-label="Duration seconds" />
        </div>
      </fieldset>

      <!-- 2. Beep Duration -->
      <fieldset class="fieldset">
        <legend>Beep Duration</legend>
        <div class="input-row">
          <label for="beep-dur">Seconds</label>
          <input id="beep-dur" class="num-input wide" type="number"
                 min="1" max="60" value="10"
                 aria-label="Beep duration seconds" />
          <span class="hint-text">sec (1–60)</span>
        </div>
      </fieldset>

      <!-- 3. Repeat Interval -->
      <fieldset class="fieldset">
        <legend>Repeat Interval</legend>
        <div class="input-row">
          <label for="int-min">Min</label>
          <input id="int-min" class="num-input" type="number"
                 min="0" max="99" value="2" placeholder="mm"
                 aria-label="Interval minutes" />
          <span class="sep">:</span>
          <label for="int-sec">Sec</label>
          <input id="int-sec" class="num-input" type="number"
                 min="0" max="59" value="0" placeholder="ss"
                 aria-label="Interval seconds" />
          <span class="hint-text">(0 = buzz once at end only)</span>
        </div>
      </fieldset>

    </form>

    <!-- Control Buttons -->
    <div class="controls" role="group" aria-label="Timer controls">
      <button id="btn-start" class="btn btn-primary"   title="Start (Space)">▶ Start</button>
      <button id="btn-pause" class="btn btn-secondary" title="Pause (Space)" disabled>⏸ Pause</button>
      <button id="btn-reset" class="btn btn-secondary" title="Reset (R)"     disabled>↺ Reset</button>
      <button id="btn-stop"  class="btn btn-danger"    title="Stop Buzzer"   disabled>✕ Stop Buzzer</button>
    </div>

    <p class="shortcuts-hint" aria-label="Keyboard shortcuts">
      <kbd>Space</kbd> Start / Pause &nbsp;|&nbsp; <kbd>R</kbd> Reset
    </p>

  </div><!-- /container -->

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
